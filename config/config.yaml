application:
  window:
    monitorIndex: -1
    width: 1920
    height: 1080
    title: Brasio Engine

  version: 0.2.0

renderer:
  type: Vulkan
  max_frames_in_flight: 2
  present_mode: FIFO

  pipelines:
    - name: Draw filled polygons
      shaders:
        vertex: vertex/ubo.vert
        fragment: fragment/minimal-triangle.frag

      dynamic_states:
        - VIEWPORT
        - SCISSOR

      input_assembly:
        primitive_restart: false
        primitive_topology: TRIANGLE_LIST

      rasterizer:
        depth_clamp: false
        discard: false
        polygon_mode: FILL
        line_width: 1
        cull_mode: BACK
        front_face: CCW
        depth_bias: false
        depth_bias_constant_factor: 0
        depth_bias_clamp: 0
        depth_bias_slope_factor: 0

      multisampling:
        sample_shading: false
        rasterization_samples: 1
        min_sample_shading: 1
        alpha_to_coverage: false
        alpha_to_one: false

      color_blend_attachment:
        writeMask: RGBA
        blend: false
        src_color_blend_factor: 1
        dst_color_blend_factor: 0
        color_blend_op: ADD
        src_alpha_blend_factor: 1
        dst_alpha_blend_factor: 0
        alpha_blend_op: ADD

      color_blend_state: 
        logic_op_enabled: false
        logic_op: COPY

    - name: Draw wireframe
      shaders:
        vertex: vertex/ubo.vert
        fragment: fragment/minimal-triangle.frag

      dynamic_states:
        - VIEWPORT
        - SCISSOR

      input_assembly:
        primitive_restart: false
        primitive_topology: TRIANGLE_LIST

      rasterizer:
        depth_clamp: false
        discard: false
        polygon_mode: LINE
        line_width: 1
        cull_mode: BACK
        front_face: CCW
        depth_bias: false
        depth_bias_constant_factor: 0
        depth_bias_clamp: 0
        depth_bias_slope_factor: 0

      multisampling:
        sample_shading: false
        rasterization_samples: 1
        min_sample_shading: 1
        alpha_to_coverage: false
        alpha_to_one: false

      color_blend_attachment:
        writeMask: RGBA
        blend: false
        src_color_blend_factor: 1
        dst_color_blend_factor: 0
        color_blend_op: ADD
        src_alpha_blend_factor: 1
        dst_alpha_blend_factor: 0
        alpha_blend_op: ADD

      color_blend_state: 
        logic_op_enabled: false
        logic_op: COPY

logging:
  level: TRACE
